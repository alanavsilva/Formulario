<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de cães</title>

    <link rel="stylesheet" href="style.css">

</head>

<header>
    <h1>Adote seu melhor amigo!</h1>
</header>

<body>

    <h2>Cadastro</h2>
    <form>
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required />
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="text" id="email" required />
        </div>

        <div>
            <label for="telefone">Telefone:</label>
            <input type="number" id="telefone" required />
        </div>

        <div>
            <label for="cpf">CPF:</label>
            <input type="number" id="cpf" required />
        </div>

        <div>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" required />
        </div>

        <div>
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" required />
        </div>

        <div>
            <label for="tipo">Tipo de moradia:</label>
            <input type="radio" id="casa" name="tipo" value="casa" required />
            <label for="casa" class="card">Casa</label>
            <input type="radio" id="apartamento" name="tipo" value="apartamento" />
            <label for="apartamento" class="card">Apartamento</label>
        </div>

        <div>
            <label for="quintal">Possui quintal?:</label>
            <input type="radio" id="quintal_sim" name="quintal" value="sim" required />
            <label for="quintal_sim" class="card">Sim</label>
            <input type="radio" id="quintal_nao" name="quintal" value="nao" />
            <label for="quintal_nao" class="card">Não</label>
        </div>

        <div>
            <label for="antes">Já teve pet antes?:</label>
            <input type="radio" id="antes_sim" name="antes" value="sim" required />
            <label for="antes_sim" class="card">Sim</label>
            <input type="radio" id="antes_nao" name="antes" value="nao" />
            <label for="antes_nao" class="card">Não</label>
        </div>

        <div>
            <label for="financeiro">Possui condições financeiras para cuidar do pet?</label> <br>
            <input type="radio" id="financeiro_sim" name="financeiro" value="sim" required />
            <label for="financeiro_sim" class="card">Sim</label></br><br>
            <input type="radio" id="financeiro_nao" name="financeiro" value="nao" />
            <label for="financeiro_nao" class="card">Não</label></br>
        </div>

        <div>
            <label for="horas_sozinho">Quantas horas o animal ficará sozinho por dia?:</label><br>
            <input type="text" id="horas_sozinho" required /></br>
        </div>

        <div>
            <label for="motivo">Motivo da adoção
                <br>(Respostas genéricas como "porque sim" não serão aceitas):</br></label>
            <input type="textarea" id="motivo" required />
        </div>

        <p>Alerta: Caso tenha decidido adotar hoje, cuidado para não ser uma decisão impulsiva!!</p>

        <div>
            <label for="termo"><u>Aceita o termo de responsabilidade:</u></label>
            <input type="checkbox" id="termo" required />
        </div>

        <button onclick="validacao()">Cadastre-se</button>
    </form>

    <script src="script.js"></script>


</body>

</html>
